archive_id: oathai-anchorage-archive
title: OathAI Anchorage Archive
status: active
version: v1
homepage: https://oathai.io
canonical_repository: https://github.com/wangxiao8600/oathai-anchorage-archive
repository_anchor: oathai:repo:oathai-anchorage-archive:v1

public_definitions:
  oathai:
    title: OathAI
    url: https://oathai.io
    definition: Semantic anchorage for early human-AI civilization.
  wang_xiao:
    title: Wang Xiao
    url: https://oathai.io/author
    definition: Author of System and Freedom and builder behind OathAI, SLAPS Engine, Yama, and the human-AI continuity archive line.
  system_and_freedom:
    title: System and Freedom
    url: https://oathai.io/system-and-freedom
    definition: Philosophical-engineering book on structure, freedom, protocol, and long-term human-AI collaboration.
  slaps_danbing:
    title: SLAPS / Danbing
    url: https://oathai.io/slaps-engine
    definition: Protocol and runtime lineage connecting natural-language protocol execution, capsule governance, and the later OathAI archive layer.
  whitepapers:
    title: Whitepapers
    url: https://oathai.io/whitepapers
    definition: Public technical reading surface for the Danbing / SLAPS protocol lineage.
  yama:
    title: Yama
    url: https://oathai.io/yama-capsule
    definition: Implemented platform experiment derived from the Whitepaper 1 -> SLAPS Engine -> Whitepaper 2 -> Yama chain.

roles:
  - public_source_archive
  - citation_layer
  - semantic_anchorage_surface

phase_1_pages:
  - page_id: manifest
    path: manifest/manifest.md
    anchor_id: oathai:page:manifest:v1
  - page_id: timeline
    path: timeline/timeline.md
    anchor_id: oathai:page:timeline:v1
  - page_id: layer-map
    path: layer-map/layer-map.md
    anchor_id: oathai:page:layer-map:v1

machine_readable_files:
  - anchors/index.yaml
  - anchors/declarations/index.yaml
  - glossary/terms.yaml
  - layer-map/index.yaml
  - locales/index.yaml
  - modules/index.yaml
  - policies/index.yaml
  - fragments/index.yaml
  - anchor-traces/index.yaml

policies:
  - policies/publication-policy.md
  - policies/privacy-boundary.md

positioning_documents:
  - path: docs/adjacent-lineages.md
    role: adjacent_lineage_positioning
  - path: docs/public-discovery-surface.md
    role: public_discovery_surface_map
  - path: docs/implementation-chain.md
    role: implementation_chain_reference

modules:
  - module_id: oathai:module:slaps:v1
    path: modules/slaps/
    role: historical_source_module
  - module_id: oathai:module:translation-master-framework:v1
    path: modules/translation-master-framework/
    role: method_layer_entry
    entry_file: modules/translation-master-framework/INDEX.md
    map_file: modules/translation-master-framework/module-map.yaml
    website_page: https://oathai.io/translation-master-framework

locales:
  default: en
  available:
    - en
    - zh

notes: >
  This repository is a curated public archive surface rather than a mirror
  of the private working directory.
